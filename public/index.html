<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonoise - 个性化阅读简报</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">🔇</div>
            <h1>Nonoise</h1>
            <p class="subtitle">从优质技术博客生成个性化中文阅读简报，告别信息噪音</p>
        </header>

        <!-- 设置面板 -->
        <section class="settings-panel" id="settingsPanel">
            <div class="panel-header">
                <h2>⚙️ 个性化设置</h2>
            </div>

            <!-- API 配置 -->
            <div class="form-group">
                <label>API 配置 <span class="required">*</span></label>
                <div class="api-config">
                    <input type="text" id="apiModel" placeholder="模型名称，如 MiniMax-M2.5、gpt-4o、claude-sonnet-4-20250514" />
                    <input type="password" id="apiKey" placeholder="API Key" />
                </div>
                <p class="form-hint">
                    支持 MiniMax、OpenAI、Anthropic、火山引擎等兼容 OpenAI 协议的大模型
                </p>
            </div>

            <!-- 关键词选择 -->
            <div class="form-group">
                <label>选择你感兴趣的关键词</label>
                <div class="keyword-tags" id="keywordTags">
                    <span class="tag" data-value="AI">AI</span>
                    <span class="tag selected" data-value="agent">Agent</span>
                    <span class="tag selected" data-value="LLM">LLM</span>
                    <span class="tag" data-value="GPT">GPT</span>
                    <span class="tag" data-value="Claude">Claude</span>
                    <span class="tag" data-value="machine learning">Machine Learning</span>
                    <span class="tag" data-value="startup">Startup</span>
                    <span class="tag" data-value="entrepreneur">Entrepreneur</span>
                    <span class="tag" data-value="SaaS">SaaS</span>
                    <span class="tag" data-value="product">Product</span>
                    <span class="tag" data-value="programming">Programming</span>
                    <span class="tag" data-value="software">Software</span>
                    <span class="tag" data-value="developer">Developer</span>
                    <span class="tag" data-value="code">Code</span>
                    <span class="tag" data-value="engineering">Engineering</span>
                </div>
                <input type="text" id="customKeywords" placeholder="自定义关键词，用英文逗号分隔，如: python,rust,web3" class="optional" />
            </div>

            <!-- 其他设置 -->
            <div class="form-group">
                <label>其他设置</label>
                <div class="settings-row">
                    <span>抓取最近</span>
                    <input type="number" id="daysBack" value="3" min="1" max="30" />
                    <span>天</span>
                </div>
                <div class="settings-row">
                    <span>最多输出</span>
                    <input type="number" id="maxArticles" value="10" min="5" max="10" />
                    <span>篇文章</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary btn-large" onclick="generateReport()">
                    🚀 一键生成阅读简报
                </button>
                <button class="btn btn-secondary" onclick="saveSettings()">
                    💾 保存设置
                </button>
            </div>
        </section>

        <!-- 加载状态 -->
        <div class="loading" id="loading" style="display: none;">
            <div class="loading-content">
                <div class="spinner"></div>
                <h3 id="loadingTitle">正在抓取资讯...</h3>
                <p id="loadingText" class="loading-desc">准备中</p>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress" id="progressBar"></div>
                    </div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
                <div class="current-item" id="currentItem"></div>
            </div>
        </div>

        <!-- 结果展示 -->
        <section class="results" id="results" style="display: none;">
            <div class="results-header">
                <div class="header-left">
                    <button class="btn btn-back" onclick="goHome()">← 返回</button>
                    <h2>📰 今日阅读简报</h2>
                </div>
                <button class="btn btn-small" onclick="copyToClipboard()">📋 复制全部</button>
            </div>
            <div class="results-meta">
                <span id="resultCount">0</span> 篇文章 · <span id="resultDate"></span>
            </div>
            <div class="articles" id="articles"></div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>🔒 数据全部在本地处理，保护你的隐私</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
